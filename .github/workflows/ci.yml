name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: scooter
          POSTGRES_PASSWORD: scooter
          POSTGRES_DB: scooterflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scooter -d scooterflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://scooter:scooter@localhost:5432/scooterflow
          PYTHONPATH: .
        run: pytest